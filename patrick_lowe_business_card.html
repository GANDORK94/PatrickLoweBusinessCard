<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrick Lowe | Westcoast Auto Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0a1628;
    --navy-mid: #0f2044;
    --navy-light: #1a3560;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #f4f1eb;
    --muted: rgba(244,241,235,0.55);
    --border: rgba(201,168,76,0.25);
  }
  body {
    background: #060e1c;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Jost', sans-serif;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 60vw;
    background: radial-gradient(ellipse, rgba(26,53,96,0.5) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .scene { perspective: 1200px; z-index: 1; }
  .card {
    width: 400px;
    background: linear-gradient(145deg, var(--navy-mid) 0%, var(--navy) 60%, #08111f 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px 36px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.1) inset, 0 1px 0 rgba(201,168,76,0.3) inset;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
    animation: cardReveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(30px) rotateX(8deg); }
    to   { opacity: 1; transform: translateY(0) rotateX(0deg); }
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--gold) 40%, var(--gold-light) 60%, transparent 100%);
    border-radius: 20px 20px 0 0;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 50%), radial-gradient(circle at 10% 90%, rgba(26,53,96,0.8) 0%, transparent 40%);
    pointer-events: none;
    border-radius: 20px;
  }
  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .brand-divider {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 50%, transparent);
    margin: 0 14px;
  }
  .brand-tag {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 300;
  }
  .profile {
    display: flex;
    align-items: flex-end;
    gap: 22px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .photo-wrap { position: relative; flex-shrink: 0; }
  .photo-ring {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    padding: 2px;
    box-shadow: 0 0 20px rgba(201,168,76,0.35);
  }
  .photo-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--navy);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
  }
  .photo-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .photo-upload-overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(10,22,40,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    cursor: pointer;
    z-index: 2;
  }
  .photo-inner:hover .photo-upload-overlay { opacity: 1; }
  .photo-upload-overlay span {
    font-size: 8px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    font-weight: 400;
  }
  #photoInput { display: none; }
  .name-block { padding-bottom: 4px; }
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--white);
    line-height: 1;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  .title {
    font-size: 10.5px;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .sep {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, var(--gold) 0%, rgba(201,168,76,0.1) 100%);
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .contacts {
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: fadeUp 0.6s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: background 0.25s, border-color 0.25s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .contact-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(201,168,76,0.07), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .contact-item:hover {
    background: rgba(201,168,76,0.06);
    border-color: rgba(201,168,76,0.2);
    transform: translateX(3px);
  }
  .contact-item:hover::before { opacity: 1; }
  .icon-box {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s;
  }
  .contact-item:hover .icon-box {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
  }
  .icon-box svg { fill: var(--gold); }
  .contact-text { display: flex; flex-direction: column; gap: 1px; }
  .contact-label {
    font-size: 8.5px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 300;
  }
  .contact-value {
    font-size: 13px;
    color: var(--white);
    font-weight: 300;
    letter-spacing: 0.03em;
  }
  .card-footer {
    margin-top: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    animation: fadeUp 0.6s 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .footer-line { flex: 1; height: 1px; background: var(--border); }
  .footer-text {
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.4);
    white-space: nowrap;
  }
  .save-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 13px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.6s 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .save-btn:hover {
    background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.1));
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }
  .save-btn:active { transform: scale(0.98); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy-light);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 50px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
